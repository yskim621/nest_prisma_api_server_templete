version: '3.8'

# 개발용 docker-compose (hot reload 지원)
services:
  # ================================
  # API Server (Development)
  # ================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nest-api-dev
    restart: unless-stopped
    ports:
      - "${PORT:-4010}:4010"
      - "${SOCKET_PORT:-4011}:4011"
      - "9229:9229"  # 디버그 포트
    environment:
      - NODE_ENV=development
      - PORT=4010
      - SOCKET_PORT=4011
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - PRISMA_DATABASE_URL=mysql://${DB_USER:-appuser}:${DB_PASSWORD:-password}@mysql:3306/${DB_NAME:-nest_template}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - ACCESS_TOKEN_SECRET_KEY=${ACCESS_TOKEN_SECRET_KEY:-dev_access_secret}
      - REFRESH_TOKEN_SECRET_KEY=${REFRESH_TOKEN_SECRET_KEY:-dev_refresh_secret}
      - ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN:-6h}
      - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN:-24h}
      - TIMEZONE=${TIMEZONE:-Asia/Seoul}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - LOGS_PATH=/app/logs
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - nest-network

  # ================================
  # RabbitMQ Message Queue
  # ================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nest-rabbitmq-dev
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - nest-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ================================
  # MySQL Database
  # ================================
  mysql:
    image: mysql:8.4.8
    container_name: nest-mysql-dev
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-nest_template}
      - MYSQL_USER=${DB_USER:-appuser}
      - MYSQL_PASSWORD=${DB_PASSWORD:-password}
      - TZ=${TIMEZONE:-Asia/Seoul}
    volumes:
      - mysql_data_dev:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - nest-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ================================
  # Redis Cache
  # ================================
  redis:
    image: redis:7-alpine
    container_name: nest-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    networks:
      - nest-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nest-network:
    driver: bridge

volumes:
  mysql_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  rabbitmq_data_dev:
    driver: local
